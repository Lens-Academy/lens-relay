# Production deployment for Hetzner VPS (46.224.127.155)
#
# Usage:
#   docker compose -f docker-compose.prod.yaml up -d
#   docker compose -f docker-compose.prod.yaml logs -f
#   docker compose -f docker-compose.prod.yaml down
#
# NOTE: relay-git-sync is intentionally NOT defined here. Its SSH deploy key is
# a multi-line value that does not interpolate reliably through compose, so a
# compose-created container starts without the key and crash-loops (breaking
# GitHub sync). It is started separately by scripts/start-git-sync.sh, which
# reads the key from file at runtime. Because it is not in this file, a bare
# `docker compose -f docker-compose.prod.yaml up -d` will not disturb it.
#
# Prerequisites:
#   - /root/relay.toml — relay server configuration
#   - /root/auth.env — Cloudflare R2 credentials (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
#   - TUNNEL_TOKEN environment variable or in .env file

# Cap container log growth. Docker's default json-file driver never rotates, so
# logs grow until they fill the disk (relay-server alone writes ~20 MB/hr of
# awareness-update output). 50 MB × 5 files bounds each container to 250 MB.
# NOTE: logging options only apply to newly created containers — run
# `docker compose -f docker-compose.prod.yaml up -d` to recreate and apply.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  cloudflared:
    image: cloudflare/cloudflared@sha256:e9bcb2ef08d25632ff74344e73a025f4f4bf12718335b196fa0e670cacace8c5
    container_name: cloudflared
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

  relay-server:
    build:
      context: crates/
      dockerfile: Dockerfile.prebuilt
    image: relay-server:custom
    container_name: relay-server
    restart: unless-stopped
    logging: *default-logging
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    volumes:
      - /root/relay.toml:/app/relay.toml:ro
    env_file:
      - /root/auth.env

  lens-editor:
    build:
      context: lens-editor/
      dockerfile: Dockerfile
    image: lens-editor:custom
    container_name: lens-editor
    restart: unless-stopped
    logging: *default-logging
    environment:
      - RELAY_URL=http://relay-server:8080
      - RELAY_SERVER_TOKEN=${RELAY_SERVER_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - SHARE_TOKEN_SECRET=${SHARE_TOKEN_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - DATALAB_API_KEY=${DATALAB_API_KEY:-}
      - PORT=3000

  # relay-git-sync is started by scripts/start-git-sync.sh, not compose — see
  # the note at the top of this file.
